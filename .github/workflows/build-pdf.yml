name: Build Feather Flow PDF

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - country: pl
            output: ff-2026-pl.pdf
          - country: by
            lang: ru
            output: ff-2026-by.pdf
          - country: us
            output: ff-2026-us.pdf
          - country: kr
            lang: kr
            output: ff-2026-kr.pdf
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pyplanner
        run: pip install .

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Generate PDF
        run: >
          pyplanner planners/ff-2026 --country ${{ matrix.country }}
          ${{ matrix.lang && format('--lang {0}', matrix.lang) || '' }}
          -o ${{ matrix.output }}

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: ${{ matrix.output }}

  publish:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: _artifacts-push
      cancel-in-progress: false
    steps:
      - name: Download PDFs
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Push to _artifacts branch
        run: |
          REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}"
          mkdir /tmp/artifacts && cd /tmp/artifacts
          git init -b _artifacts
          git remote add origin "$REPO_URL"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin _artifacts && \
            git checkout FETCH_HEAD -- . || true
          cp "$GITHUB_WORKSPACE"/*.pdf .
          git add .
          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          MSG="PDF ${GITHUB_REF_NAME}@${SHORT_SHA}"
          git diff --cached --quiet && echo "No changes" || \
            (git commit -m "$MSG" && \
             git push -f origin _artifacts)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
