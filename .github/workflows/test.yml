name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e .[dev]

      - name: Ruff check
        run: ruff check .

      - name: Mypy
        run: mypy src/

      - name: Generate lint badge
        if: github.ref == 'refs/heads/main'
        run: |
          pip install anybadge
          anybadge -l lint -v passing -f lint-badge.svg \
            passing=green failing=red

      - name: Upload lint badge
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: lint-badge
          path: lint-badge.svg

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e .[dev]

      - name: Run tests
        run: >
          pytest
          --cov
          --cov-report=term
          --cov-report=xml:coverage.xml

      - name: Generate coverage badge
        if: github.ref == 'refs/heads/main'
        run: |
          pip install genbadge[coverage]
          genbadge coverage -i coverage.xml -o coverage-badge.svg

      - name: Upload coverage badge
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-badge
          path: coverage-badge.svg

  publish:
    if: github.ref == 'refs/heads/main'
    needs: [lint, test]
    runs-on: ubuntu-latest
    concurrency:
      group: _artifacts-push
      cancel-in-progress: false
    steps:
      - name: Download badges
        uses: actions/download-artifact@v4
        with:
          pattern: "*-badge"
          merge-multiple: true

      - name: Push to _artifacts branch
        run: |
          REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}"
          mkdir /tmp/artifacts && cd /tmp/artifacts
          git init -b _artifacts
          git remote add origin "$REPO_URL"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin _artifacts && \
            git checkout FETCH_HEAD -- . || true
          cp "$GITHUB_WORKSPACE"/*-badge.svg .
          git add .
          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          MSG="Badges ${GITHUB_REF_NAME}@${SHORT_SHA}"
          git diff --cached --quiet && echo "No changes" || \
            (git commit -m "$MSG" && \
             git push -f origin _artifacts)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
